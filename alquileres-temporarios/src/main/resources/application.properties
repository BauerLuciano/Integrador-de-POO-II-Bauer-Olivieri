# Nombre de la aplicación
spring.application.name=chealquila

# Configuración de la conexión a PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/alquileres_temporarios
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola (te sirve para debuguear)
spring.jpa.show-sql=true

# Formatea el SQL en consola para que sea legible
spring.jpa.properties.hibernate.format_sql=true

# Dialecto específico para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect